<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam Checklist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="checklist-card">
      <div class="badge">Vietnam Trip</div>

      <h1>푸꾸옥 여행 체크리스트</h1>

      <p class="description">
        여행 전 챙겨야 할 항목을 하나씩 확인해보세요.
      </p>

      <div class="checklist">
        <label class="check-item">
          <input type="checkbox" />
          <span>여권 챙기기</span>
        </label>

        <label class="check-item">
          <input type="checkbox" />
          <span>항공권 예약 확인하기</span>
        </label>

        <label class="check-item">
          <input type="checkbox" />
          <span>숙소 바우처 확인하기</span>
        </label>

        <label class="check-item">
          <input type="checkbox" />
          <span>eSIM 또는 로밍 준비하기</span>
        </label>

        <label class="check-item">
          <input type="checkbox" />
          <span>트래블카드 / 현금 준비하기</span>
        </label>
      </div>
    </section>
  </main>
</body>
</html>
